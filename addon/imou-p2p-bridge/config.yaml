name: Imou P2P Bridge
version: "0.3.0"
slug: imou_p2p_bridge
description: Local RTSP/WebRTC bridge for Imou/Dahua cameras (cloud P2P + LAN) via go2rtc
url: https://github.com/khoanguyen-3fc/dh-p2p
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:cctv
panel_title: Imou Devices
ports:
  8554/tcp: 8554
  1984/tcp: 1984
  8555/tcp: 8555
  8555/udp: 8555
ports_description:
  8554/tcp: go2rtc RTSP restream (point Frigate / Generic Camera here)
  1984/tcp: go2rtc web UI + API
  8555/tcp: go2rtc WebRTC (TCP)
  8555/udp: go2rtc WebRTC (UDP)
options:
  log_level: info
  discovery_ui: true
  go2rtc:
    rtsp_port: 8554
    api_port: 1984
    webrtc_port: 8555
  bridge:
    binary: /opt/dh-p2p/dh-p2p
    restart_seconds: 5
    base_port: 8600
    verbose: false
  cameras:
    - name: yard
      mode: p2p
      serial: CAMERA_SERIAL
      username: admin
      password: ""
      channel: 1
      subtype: 0
      relay: false
  mqtt:
    enabled: false
    host: core-mosquitto
    port: 1883
    username: ""
    password: ""
    topic_prefix: imou_p2p
    discovery: true
    discovery_prefix: homeassistant
schema:
  log_level: list(trace|debug|info|warning|error)?
  discovery_ui: bool
  go2rtc:
    rtsp_port: port
    api_port: port
    webrtc_port: port
  bridge:
    binary: str
    restart_seconds: int
    base_port: int
    verbose: bool
  cameras:
    - name: str
      mode: list(p2p|lan)
      serial: str?
      host: str?
      username: str
      password: password
      channel: int?
      subtype: int?
      relay: bool?
  mqtt:
    enabled: bool
    host: str
    port: int
    username: str
    password: password
    topic_prefix: str
    discovery: bool
    discovery_prefix: str
