name: Imou P2P Bridge
version: "0.4.0"
slug: imou_p2p_bridge
description: Account-managed Imou/Dahua bridge with go2rtc, ONVIF, and DLNA talk endpoints
url: https://github.com/home-assistant-tools/imou-life
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:cctv
panel_title: Imou Devices
ports:
  8554/tcp: 8554
  1984/tcp: 1984
  8555/tcp: 8555
  8555/udp: 8555
  8700/tcp: 8700
  8800/tcp: 8800
ports_description:
  8554/tcp: go2rtc RTSP restream (point Frigate / Generic Camera here)
  1984/tcp: go2rtc web UI + API
  8555/tcp: go2rtc WebRTC (TCP)
  8555/udp: go2rtc WebRTC (UDP)
  8700/tcp: first per-camera ONVIF endpoint (additional cameras use 8701+ with host networking)
  8800/tcp: first per-camera DLNA media renderer for talk/TTS (additional cameras use 8801+ with host networking)
options:
  log_level: info
  discovery_ui: true
  advertised_host: ""
  onvif_base_port: 8700
  dlna_base_port: 8800
  go2rtc:
    rtsp_port: 8554
    api_port: 1984
    webrtc_port: 8555
  bridge:
    engine: python
    binary: /opt/dh-p2p/dh-p2p
    python_bridge: /opt/imou-p2p-bridge/imou_dhp2p.py
    restart_seconds: 5
    base_port: 8600
    verbose: false
  accounts: []
  cameras:
    - name: yard
      mode: p2p
      serial: CAMERA_SERIAL
      username: admin
      password: ""
      relay: false
      ptz: true
      talk: true
schema:
  log_level: list(trace|debug|info|warning|error)?
  discovery_ui: bool
  advertised_host: str?
  onvif_base_port: port
  dlna_base_port: port
  go2rtc:
    rtsp_port: port
    api_port: port
    webrtc_port: port
  bridge:
    engine: list(python|rust)?
    binary: str
    python_bridge: str?
    restart_seconds: int
    base_port: int
    verbose: bool
  accounts: list?
  cameras:
    - name: str
      mode: list(p2p|lan)
      serial: str?
      host: str?
      username: str
      password: password
      relay: bool?
      ptz: bool?
      talk: bool?
      streams: list?
